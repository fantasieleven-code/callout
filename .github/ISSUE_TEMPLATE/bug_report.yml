name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: dropdown
    id: editor
    attributes:
      label: Editor / CLI
      options:
        - Claude Code
        - Cursor
        - VS Code (Copilot)
        - Windsurf
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Callout version
      description: "Run: npm list callout-dev"
      placeholder: "0.2.2"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell
