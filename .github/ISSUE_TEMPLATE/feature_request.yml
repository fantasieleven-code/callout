name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think this should work?
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New tool / perspective
        - Existing tool improvement
        - Editor support
        - Documentation
        - Other
    validations:
      required: true
